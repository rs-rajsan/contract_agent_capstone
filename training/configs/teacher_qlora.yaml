# Teacher Model QLoRA Configuration
# Model: Qwen2.5-7B-Instruct

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  max_seq_length: 2048

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_use_double_quant: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

training:
  output_dir: "./outputs/teacher_qlora"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 1      # Reduced to prevent OOM during evaluation
  gradient_accumulation_steps: 4    # effective batch = 16
  eval_accumulation_steps: 4        # Accumulate eval tensors on CPU to save GPU memory
  learning_rate: 0.0002
  lr_scheduler_type: "cosine"
  warmup_steps: 100                 # Replacing deprecated warmup_ratio
  weight_decay: 0.01
  optim: "paged_adamw_8bit"
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 200
  eval_strategy: "steps"
  eval_steps: 200
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  report_to: "none"  # set to "wandb" if tracking enabled
  seed: 42

data:
  datasets:
    - name: "cuad"
      weight: 0.3
    - name: "contract_nli"
      weight: 0.25
    - name: "maud"
      weight: 0.25
    - name: "internal"
      weight: 0.2
  train_split: "train"
  eval_split: "validation"
  data_dir: "./data/processed"
