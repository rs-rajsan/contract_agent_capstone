services:
  backend:
    build:
      context: ./backend
    environment:
      - NEO4J_URI=${NEO4J_URI-neo4j+s://demo.neo4jlabs.com:7687}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD-legalcontracts}
      - NEO4J_USERNAME=${NEO4J_USERNAME-legalcontracts}
      - NEO4J_DATABASE=${NEO4J_DATABASE-legalcontracts}
      - OPENAI_API_KEY=${OPENAI_API_KEY-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY-}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - REDIS_URL=redis://redis:6379
    networks:
      - net
    x-develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
        - action: rebuild
          path: ./backend/pyproject.toml
    ports:
      - 8000:8000
    volumes:
      - ./logs:/app/logs
  ui:
    build:
      context: ./frontend
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL-http://backend:8000}
    networks:
      - net
    x-develop:
      watch:
        - action: rebuild
          path: ./frontend
    ports:
      - 3000:5173
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - 6006:6006
      - 4317:4317
    networks:
      - net
  redis:
    image: redis:alpine
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  net: