services:
  backend:
    build:
      context: ./backend
    environment:
      - NEO4J_URI=${NEO4J_URI-neo4j+s://demo.neo4jlabs.com:7687}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD-legalcontracts}
      - NEO4J_USERNAME=${NEO4J_USERNAME-legalcontracts}
      - NEO4J_DATABASE=${NEO4J_DATABASE-legalcontracts}
      - OPENAI_API_KEY=${OPENAI_API_KEY-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY-}
      - GEMINI_API_KEY=${GEMINI_API_KEY-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY-}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - REDIS_URL=redis://redis:6379
      - BACKEND_DEFAULT_MODEL=${BACKEND_DEFAULT_MODEL-gemini-2.5-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL-gemini-embedding-001}
      - GEMINI_MODEL_DEFAULT=${GEMINI_MODEL_DEFAULT-gemini-2.5-flash}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL-gemini-1.5-pro}
      - MODEL_ALIAS_MAP=${MODEL_ALIAS_MAP-}
      - MCP_PORT=${MCP_PORT-8100}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://pguser:pgpassword@postgres:5432/contract_intel}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_32_CHARS_MIN}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD:-Admin@1234!}
      - CORS_ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173","http://127.0.0.1:3000"]
    depends_on:
      - redis
      - postgres
    networks:
      - net
    x-develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
        - action: rebuild
          path: ./backend/pyproject.toml
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app/backend
      - ./logs:/app/logs
  ui:
    build:
      context: ./frontend
    environment:
      - VITE_BACKEND_URL=${VITE_BACKEND_URL-http://backend:8000}
      - VITE_DEFAULT_MODEL=${VITE_DEFAULT_MODEL-gemini-2.5-flash}
      - VITE_AVAILABLE_MODELS=${VITE_AVAILABLE_MODELS-gemini-2.5-flash,gemini-1.5-pro,gpt-4o,sonnet-3.5}
    networks:
      - net
    x-develop:
      watch:
        - action: rebuild
          path: ./frontend
    ports:
      - 3000:5173
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - 6006:6006
      - 4317:4317
    networks:
      - net
  redis:
    image: redis:alpine
    networks:
      - net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: contract_intel
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d contract_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  net:

volumes:
  pgdata: